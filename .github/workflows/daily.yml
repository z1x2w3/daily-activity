name: Daily Market Activity Collector

on:
  schedule:
    - cron: "35-59/15 1 * * 1-5"
    - cron: "*/15 2-4 * * 1-5"
    - cron: "*/15 5-7 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"

      - name: Install dependencies
        run: |
          pip install akshare==1.18.63 pandas==3.0.3

      - name: Run script
        run: |
          python activity.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily_market_activity_*.csv
          git commit -m "📈 update market activity data $(date +'%Y-%m-%d')" || echo "No changes"
          git push
